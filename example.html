<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>pagex is live</title>
  <style>
    :root { color-scheme: light; font-family: ui-monospace, sfmono-regular, consolas, monospace; }
    * { box-sizing: border-box; }
    body { margin: 0; background: #f4efe5; color: #171512; }
    main { min-height: 100svh; display: grid; align-content: center; gap: 2.5rem; width: min(76rem, 100%); padding: clamp(2rem, 7vw, 7rem); }
    .label { color: #c7432c; font-size: .75rem; letter-spacing: .16em; text-transform: uppercase; }
    h1 { max-width: 10ch; margin: 0; font-family: georgia, serif; font-size: clamp(3.8rem, 12vw, 10rem); font-weight: 400; letter-spacing: -.07em; line-height: .82; }
    p { max-width: 44rem; margin: 0; font-family: georgia, serif; font-size: clamp(1.2rem, 2.4vw, 2rem); line-height: 1.35; }
    footer { padding-top: 1rem; border-top: 1px solid #cfc5b5; color: #746b5e; font-size: .75rem; }
  </style>
</head>
<body>
  <main>
    <div class="label">pagex / example</div>
    <h1>one file. one private url.</h1>
    <p>turn a researched or visual answer into one self-contained html file, publish it to cloudflare r2 and send an authenticated link instead of a wall of chat text.</p>
    <footer>no framework · no build step · no external runtime assets</footer>
  </main>
</body>
</html>
